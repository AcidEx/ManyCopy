name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET SDK 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish (Release)
        shell: pwsh
        run: |
          dotnet restore
          dotnet build -c Release --nologo
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/publish-and-sign.ps1 -Configuration Release
      - name: Compute checksum
        shell: pwsh
        run: |
          $pub = Join-Path $pwd 'bin/Release/net8.0-windows/win-x64/publish'
          $exe = Join-Path $pub 'ManyCopy.exe'
          $hash = Get-FileHash -Algorithm SHA256 -Path $exe
          Set-Content -Path (Join-Path $pub 'ManyCopy.exe.sha256') -Value ("{0} *ManyCopy.exe" -f $hash.Hash) -Encoding ASCII
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
