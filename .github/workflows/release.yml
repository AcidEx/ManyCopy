name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        shell: pwsh
        run: dotnet restore
      - name: Publish (Release)
        shell: pwsh
        run: dotnet publish ManyCopy.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:PublishTrimmed=false --nologo
      - name: Compute checksum
        shell: pwsh
        run: |
          $pub = Join-Path $pwd 'bin/Release/net8.0-windows/win-x64/publish'
          $exe = Join-Path $pub 'ManyCopy.exe'
          $hash = Get-FileHash -Algorithm SHA256 -Path $exe
          Set-Content -Path (Join-Path $pub 'ManyCopy.exe.sha256') -Value ("{0} *ManyCopy.exe" -f $hash.Hash) -Encoding ASCII
      - name: Create zip
        shell: pwsh
        run: |
          $pub = Join-Path $pwd 'bin/Release/net8.0-windows/win-x64/publish'
          $exe = Join-Path $pub 'ManyCopy.exe'
          $sha = Join-Path $pub 'ManyCopy.exe.sha256'
          $zip = Join-Path $pub 'ManyCopy-1.1.6-win-x64.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -LiteralPath $exe,$sha -DestinationPath $zip -Force
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy-*-win-x64.zip
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
