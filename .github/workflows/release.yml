name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET SDK 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      
      - name: Sanitize csproj
        shell: pwsh
        run: |
          $content = @"<Project Sdk=\"Microsoft.NET.Sdk\">
  <PropertyGroup>
    <TargetFramework>net8.0-windows</TargetFramework>
    <UseWindowsForms>true</UseWindowsForms>
    <EnableWindowsTargeting>true</EnableWindowsTargeting>
    <OutputType>WinExe</OutputType>
    <AssemblyName>ManyCopy</AssemblyName>
    <RootNamespace>ManyCopy</RootNamespace>
    <Nullable>enable</Nullable>
    <ImplicitUsings>enable</ImplicitUsings>
    <AssemblyVersion>1.1.6.0</AssemblyVersion>
    <FileVersion>1.1.6.0</FileVersion>
    <InformationalVersion>1.1.6</InformationalVersion>
    <Version>1.1.6</Version>
    <RuntimeIdentifier>win-x64</RuntimeIdentifier>
    <SelfContained>true</SelfContained>
    <PublishSingleFile>true</PublishSingleFile>
    <IncludeNativeLibrariesForSelfExtract>true</IncludeNativeLibrariesForSelfExtract>
    <EnableCompressionInSingleFile>true</EnableCompressionInSingleFile>
    <PublishReadyToRun>true</PublishReadyToRun>
    <PublishTrimmed>false</PublishTrimmed>
    <GenerateTargetFrameworkAttribute>false</GenerateTargetFrameworkAttribute>
    <DebugType>none</DebugType>
    <GenerateDocumentationFile>false</GenerateDocumentationFile>
    <ProduceReferenceAssembly>false</ProduceReferenceAssembly>
    <CopyOutputSymbolsToOutputDirectory>false</CopyOutputSymbolsToOutputDirectory>
    <CopyOutputSymbolsToPublishDirectory>false</CopyOutputSymbolsToPublishDirectory>
    <Platforms>x64</Platforms>
    <Prefer32Bit>false</Prefer32Bit>
    <ApplicationIcon>Assets\\ManyCopy.ico</ApplicationIcon>
    <ApplicationManifest>app.manifest</ApplicationManifest>
    <ApplicationHighDpiMode>PerMonitorV2</ApplicationHighDpiMode>
  </PropertyGroup>
  <ItemGroup>
    <EmbeddedResource Include=\"Assets\\splash.png\">
      <LogicalName>Assets.splash.png</LogicalName>
    </EmbeddedResource>
  </ItemGroup>
  <ItemGroup>
    <ProjectReference Include=\"ManyCopy.Core/ManyCopy.Core.csproj\" />
  </ItemGroup>
  <ItemGroup>
    <Compile Remove=\"tests\\**\\*.cs\" />
    <EmbeddedResource Remove=\"tests\\**\\*\" />
    <None Remove=\"tests\\**\\*\" />
    <Compile Remove=\"ManyCopy.Core\\**\\*.cs\" />
    <EmbeddedResource Remove=\"ManyCopy.Core\\**\\*\" />
    <None Remove=\"ManyCopy.Core\\**\\*\" />
  </ItemGroup>
</Project>
"@; Set-Content -Path ManyCopy.csproj -Value $content -Encoding UTF8
          [xml](Get-Content ManyCopy.csproj -Raw) | Out-Null
          Write-Host 'csproj XML validated.'
      - name: Show csproj head
        shell: pwsh
        run: |
          Write-Host '--- ManyCopy.csproj HEAD ---'
          Get-Content ManyCopy.csproj -TotalCount 60
          Write-Host '--- EOF ---'
      - name: Publish (Release)
        shell: pwsh
        run: |
          dotnet restore
          dotnet publish ManyCopy.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:PublishTrimmed=false --nologo
      - name: Compute checksum
        shell: pwsh
        run: |
          $pub = Join-Path $pwd 'bin/Release/net8.0-windows/win-x64/publish'
          $exe = Join-Path $pub 'ManyCopy.exe'
          $hash = Get-FileHash -Algorithm SHA256 -Path $exe
          Set-Content -Path (Join-Path $pub 'ManyCopy.exe.sha256') -Value ("{0} *ManyCopy.exe" -f $hash.Hash) -Encoding ASCII
      - name: Create zip
        shell: pwsh
        run: |
          $pub = Join-Path $pwd 'bin/Release/net8.0-windows/win-x64/publish'
          $exe = Join-Path $pub 'ManyCopy.exe'
          $sha = Join-Path $pub 'ManyCopy.exe.sha256'
          $ver = (Select-String -Path 'ManyCopy.csproj' -Pattern '<Version>(.*?)</Version>').Matches.Groups[1].Value
          if (-not $ver) { $ver = '1.1.6' }
          $zip = Join-Path $pub ("ManyCopy-$ver-win-x64.zip")
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -LiteralPath $exe,$sha -DestinationPath $zip -Force
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy-*-win-x64.zip
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe
            bin/Release/net8.0-windows/win-x64/publish/ManyCopy.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


