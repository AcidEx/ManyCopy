name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build || echo "no tests found"
        shell: cmd
      - run: dotnet publish ManyCopy.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeAllContentForSelfExtract=true /p:DebugType=None /p:DebugSymbols=false
      - uses: actions/upload-artifact@v4
        with:
          name: ManyCopy-win-x64
          path: '**/publish/**'
