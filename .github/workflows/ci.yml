name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore ManyCopy.csproj
      - run: dotnet restore tests/ManyCopy.Tests/ManyCopy.Tests.csproj
      - run: dotnet build ManyCopy.csproj -c Release --no-restore
      - run: dotnet build tests/ManyCopy.Tests/ManyCopy.Tests.csproj -c Release --no-restore
      - run: dotnet test tests/ManyCopy.Tests/ManyCopy.Tests.csproj -c Release --no-build
        shell: pwsh
      - run: dotnet publish ManyCopy.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeAllContentForSelfExtract=true /p:DebugType=None /p:DebugSymbols=false --no-build
      - uses: actions/upload-artifact@v4
        with:
          name: ManyCopy-win-x64
          path: '**/publish/**'
